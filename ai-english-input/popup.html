<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Input</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <img src="icons/icon48.png" alt="" class="popup__logo">
        <div>
          <h1>AI English Input</h1>
          <p>中文输入，英文发送</p>
        </div>
      </header>

      <section class="card">
        <h2>当前状态</h2>
        <dl class="status-list">
          <div>
            <dt>输入语言</dt>
            <dd id="input-language">中文</dd>
          </div>
          <div>
            <dt>输出语言</dt>
            <dd id="output-language">English</dd>
          </div>
          <div>
            <dt>默认场景</dt>
            <dd id="scene">跨境客服</dd>
          </div>
          <div>
            <dt>默认语气</dt>
            <dd id="tone">礼貌自然</dd>
          </div>
          <div>
            <dt>今日剩余</dt>
            <dd id="remaining" class="usage-count">15 次</dd>
          </div>
        </dl>
      </section>

      <section class="card">
        <h2>默认设置</h2>
        <div class="setting-list">
          <label class="setting-field" for="scene-select">
            <span>切换场景</span>
            <select id="scene-select">
              <option value="cross_border_cs">跨境客服</option>
              <option value="foreign_trade_email">外贸邮件</option>
              <option value="social_media">社媒互动</option>
              <option value="general">通用翻译</option>
            </select>
          </label>
          <label class="setting-field" for="tone-select">
            <span>切换语气</span>
            <select id="tone-select">
              <option value="polite">礼貌自然</option>
              <option value="concise">简洁直接</option>
              <option value="formal">正式专业</option>
              <option value="apology">安抚道歉</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card">
        <h2>快捷键</h2>
        <ul class="shortcut-list">
          <li><kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>E</kbd><span>生成当前输入</span></li>
          <li><kbd>Tab</kbd><span>浏览候选（规划中）</span></li>
          <li><kbd>Esc</kbd><span>关闭候选框</span></li>
        </ul>
      </section>

      <footer class="popup__footer">
        <span id="user-id">正在初始化...</span>
        <nav class="footer-nav" aria-label="底部导航">
          <a href="#" data-placeholder-link>查看历史</a>
          <a href="https://github.com/kaka5618/english-input/issues" target="_blank" rel="noreferrer">反馈问题</a>
        </nav>
        <span id="footer-message" class="footer-message" aria-live="polite"></span>
      </footer>
    </main>

    <script src="utils/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
